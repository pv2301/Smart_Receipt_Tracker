version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: receipt_db
    restart: always
    environment:
      POSTGRES_USER: receipt_user
      POSTGRES_PASSWORD: receipt_password
      POSTGRES_DB: receipt_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
